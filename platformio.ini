; PlatformIO Project Configuration File
; ESP32-2432S028R (Cheap Yellow Display - CYD)
; Board: ESP32 with ILI9341 2.8" TFT Display

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
board_build.partitions = min_spiffs.csv

; Upload speed
upload_speed = 460800
monitor_speed = 115200
; Libraries
lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    h2zero/NimBLE-Arduino @ ^1.4.3
    https://github.com/PaulStoffregen/XPT2046_Touchscreen
    Wire
    SPI

; Build flags untuk TFT_eSPI - menggunakan User_Setup.h kustom
build_flags =
    -DUSER_SETUP_LOADED=1
    ; TFT Pins untuk ESP32-2432S028R
    -DILI9341_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_MISO=12
    -DTFT_MOSI=13
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1
    -DTFT_BL=21
    -DTFT_BACKLIGHT_ON=HIGH
    ; Touch (XPT2046) - VSPI bus, CS pin
    -DTOUCH_CS=33
    -DTOUCH_IRQ=36
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_FONT7=1
    -DLOAD_FONT8=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
    -DSPI_FREQUENCY=55000000
    -DSPI_READ_FREQUENCY=20000000
    -DSPI_TOUCH_FREQUENCY=2500000
    ; NimBLE - level log minimal
    -DCONFIG_NIMBLE_CPP_LOG_LEVEL=0
